name: CI

on:
  push:
    branches:
      - main
      - nightly
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-hack
        run: cargo install cargo-hack

      # - name: Install cargo-semver-checks
      #   if: matrix.rust == 'stable'
      #   uses: taiki-e/install-action@v2
      #   with:
      #     tool: cargo-semver-checks

      - name: Check (Compilation)
        run: RUSTFLAGS="-D warnings" cargo hack check --feature-powerset --all-targets

      - name: Run Tests
        run: cargo hack test --feature-powerset --lib

      - name: Run Doc Tests
        run: cargo test --doc --all-features

      - name: Check Formatting
        if: matrix.rust == 'stable'
        run: cargo fmt --all -- --check

      - name: Lint
        if: matrix.rust == 'stable'
        run: RUSTFLAGS="-D warnings" cargo hack clippy --feature-powerset --all-targets

      # - name: Check SemVer Violation
      #   if: matrix.rust == 'stable'
      #   run: cargo semver-checks check-release

      # - name: Upload cargo-semver-checks Crash Report
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: cargo-semver-checks-crash-report
      #     path: /tmp/report-*.toml
      #     if-no-files-found: ignore

      - name: Install thumbv7em-none-eabihf Target
        run: rustup target add thumbv7em-none-eabihf

      - name: Check no_std Compliance (Ad-Hoc for Now)
        run: |
          cargo hack b \
            --feature-powerset \
            --exclude-features std,default \
            --target thumbv7em-none-eabihf

  # cargo-semver-checks seems to be very sensitive to Rust version change,
  # we pin a specific version here until it works for the next version.
  sem-ver-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          # The latest one that still works.
          toolchain: 1.93.1

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Check SemVer Violation
        run: cargo semver-checks check-release
