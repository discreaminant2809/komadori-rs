name: CI for komadori-rayon

on:
  push:
    branches:
      - main
      - nightly
  pull_request:

env:
  CRATE_NAME: komadori-rayon

jobs:
  # cargo-semver-checks seems to be very sensitive to Rust version change,
  # we pin a specific version here until it works for the next version.
  sem-ver-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          # The latest one that still works for `cargo-semver-checks`.
          toolchain: 1.96.0

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Check SemVer Violation
        run: cargo semver-checks check-release -p ${{ env.CRATE_NAME }}

      # If we ever bump the rust version up and get an error,
      # we know exactly it is the case and downgrade the version.
      - name: Upload cargo-semver-checks Crash Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-semver-checks-crash-report
          path: /tmp/report-*.toml
          if-no-files-found: ignore
