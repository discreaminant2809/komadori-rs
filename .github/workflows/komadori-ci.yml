name: CI for komadori

on:
  push:
    branches:
      - main
      - nightly
  pull_request:

env:
  CRATE_NAME: komadori

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-hack
        run: cargo install cargo-hack

      # For "Check no_std Compliance"
      - name: Install thumbv7em-none-eabihf Target
        run: rustup target add thumbv7em-none-eabihf

      - name: Check no_std Compliance (Ad-Hoc for Now)
        run: |
          cargo hack b \
            --feature-powerset \
            --exclude-features std,default \
            --target thumbv7em-none-eabihf \
            -p komadori

  # cargo-semver-checks seems to be very sensitive to Rust version change,
  # we pin a specific version here until it works for the next version.
  sem-ver-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@v1
        with:
          # The latest one that still works for `cargo-semver-checks`.
          toolchain: 1.96.0

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: Check SemVer Violation
        run: cargo semver-checks check-release -p ${{ env.CRATE_NAME }}

      # If we ever bump the rust version up and get an error,
      # we know exactly it is the case and downgrade the version.
      - name: Upload cargo-semver-checks Crash Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cargo-semver-checks-crash-report
          path: /tmp/report-*.toml
          if-no-files-found: ignore
